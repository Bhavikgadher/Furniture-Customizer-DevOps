trigger:
  branches:
    include:
      - main


pool:
  name: 'SelfHostedPool'

stages:
  - stage: Code
    displayName: 'Code'
    jobs:
      - job: Validate
        steps:
          - checkout: self
          - script: docker compose config --quiet
            displayName: 'Validate Compose File' 

            
  - stage: Build
    displayName: 'Build'
    dependsOn: Code
    jobs:
      - job: Build
        steps:
          - checkout: self
          - script: docker compose build
            displayName: 'Build Docker Images'
  
  - stage: Deploy
    displayName: 'Deploy'
    jobs:
      - job: Deploy
        steps:
          - checkout: self
          - script: |
              docker compose down
              docker compose up -d
              echo "Waiting for database to initialize..."
              sleep 15
              docker compose up -d
            displayName: 'Deploy Furniture Customizer'