trigger:
  branches:
    include:
      - main


pool:
  name: 'SelfHostedPool'

stages:
  - stage: Code
    displayName: 'Code'
    jobs:
      - job: Validate
        steps:
          - checkout: self
          - powershell: |
              $envContent = @"
              NODE_ENV=$(NODE_ENV)
              DB_NAME=$(DB_NAME)
              DB_USER=$(DB_USER)
              DB_PASSWORD=$(DB_PASSWORD)
              DB_PORT=$(DB_PORT)
              JWT_SECRET=$(JWT_SECRET)
              PORT=$(PORT)
              USER_UI_PORT=$(USER_UI_PORT)
              ADMIN_UI_PORT=$(ADMIN_UI_PORT)
              "@
              $envContent | Out-File -FilePath .env -Encoding utf8
            displayName: 'Create root .env file'
            pwsh: false
          - script: docker compose config --quiet
            displayName: 'Validate Compose File' 

            
  - stage: Build
    displayName: 'Build'
    dependsOn: Code
    jobs:
      - job: Build
        steps:
          - checkout: self
          - powershell: |
              # Root .env
              $rootEnv = @"
              NODE_ENV=$(NODE_ENV)
              DB_NAME=$(DB_NAME)
              DB_USER=$(DB_USER)
              DB_PASSWORD=$(DB_PASSWORD)
              DB_PORT=$(DB_PORT)
              JWT_SECRET=$(JWT_SECRET)
              PORT=$(PORT)
              USER_UI_PORT=$(USER_UI_PORT)
              ADMIN_UI_PORT=$(ADMIN_UI_PORT)
              "@
              $rootEnv | Out-File -FilePath .env -Encoding utf8

              # Admin FrontEnd .env
              $adminEnv = "VITE_API_BASE_URL=$(VITE_API_BASE_URL)"
              $adminEnv | Out-File -FilePath Furniture_Customizer_Admin/FrontEnd/.env -Encoding utf8
            displayName: 'Create .env files'
            pwsh: false
          - script: docker compose build
            displayName: 'Build Docker Images'
  
  - stage: Deploy
    displayName: 'Deploy'
    jobs:
      - job: Deploy
        steps:
          - checkout: self
          - powershell: |
              $envContent = @"
              NODE_ENV=$(NODE_ENV)
              DB_NAME=$(DB_NAME)
              DB_USER=$(DB_USER)
              DB_PASSWORD=$(DB_PASSWORD)
              DB_PORT=$(DB_PORT)
              JWT_SECRET=$(JWT_SECRET)
              PORT=$(PORT)
              USER_UI_PORT=$(USER_UI_PORT)
              ADMIN_UI_PORT=$(ADMIN_UI_PORT)
              "@
              $envContent | Out-File -FilePath .env -Encoding utf8
            displayName: 'Create root .env file'
            pwsh: false
          - script: |
              docker compose down
              docker compose up -d
              echo "Waiting for database to initialize..."
              sleep 15
              docker compose up -d
            displayName: 'Deploy Furniture Customizer'